        const textLines = [

            "Hôm nay là một ngày rất đặc biệt...",
            "Minh có một điều này muốn cho Thương.",

        function typeWriter() {
            if (lineIdx < textLines.length) {
                if (charIdx < textLines[lineIdx].length) {
                   
                    textOutput.innerHTML += textLines[lineIdx].charAt(charIdx);
                    charIdx++;
                    setTimeout(typeWriter, 70);
                } else {
                 
                    lineIdx++;
                    charIdx = 0;
                    
                    if (lineIdx < textLines.length) {
                        
                        setTimeout(() => {
                            textOutput.innerHTML = ""; 
                            setTimeout(typeWriter, 400); 
                        }, 1500);
                    } else {
                    
                        setTimeout(() => {
                            typewriterContainer.style.display = 'none'; 
                            setTimeout(() => {
                                openGiftBtn.classList.add('show');
                            }, 300);
                        }, 1300);
                    }
                }
            }
        }

        
        window.onload = () => {
            setTimeout(typeWriter, 1000);
        };


        // --- DANH SÁCH NHẠC ---
        const playlist = [
            "1.mp3",
            "2.mp3", 
            "3.mp3", 
            "4.mp3",
            "5.mp3"  
        ];

        const overlay = document.getElementById('overlay');
        const mainContent = document.getElementById('main-content');
        const audio = document.getElementById('bgMusic');
        const surpriseBtn = document.getElementById('surpriseBtn');
        const letterModal = document.getElementById('letterModal');
        const envelopeWrapper = document.getElementById('envelopeWrapper');
        const closeModal = document.getElementById('closeModal');
        const rainContainer = document.getElementById('heavyRainContainer');
        const bgHearts = document.getElementById('bgHearts');

        // --- TÍNH NĂNG CHỌN NHẠC NGẪU NHIÊN VÀ TỰ ĐỘNG CHUYỂN BÀI ---
        let currentSongIndex = Math.floor(Math.random() * playlist.length);
        audio.src = playlist[currentSongIndex];

        audio.addEventListener('ended', () => {
            let nextSongIndex;
            do {
                nextSongIndex = Math.floor(Math.random() * playlist.length);
            } while (nextSongIndex === currentSongIndex && playlist.length > 1);
            
            currentSongIndex = nextSongIndex;
            audio.src = playlist[currentSongIndex];
            audio.play().catch(e => console.log("Lỗi tự động phát nhạc:", e));
        });


        // --- TÍNH NĂNG MƯA TIM RƠI LIÊN TỤC (BACKGROUND) ---
        function createContinuousHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'bg-heart';
                heart.innerHTML = '<i class="fas fa-heart"></i>';
                
                heart.style.left = Math.random() * 100 + '%';
                heart.style.color = `rgba(255, 80, 130, ${Math.random() * 0.4 + 0.3})`;
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                
                const fallDuration = Math.random() * 5 + 7;
                heart.style.animation = `bgHeartFall ${fallDuration}s linear forwards`;
                
                bgHearts.appendChild(heart);
                
                setTimeout(() => {
                    heart.remove();
                }, fallDuration * 1000);
            }, 300); 
        }
        createContinuousHearts();


        // --- SỰ KIỆN MỞ MÀN HÌNH ---
        document.getElementById('openGift').addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                mainContent.classList.add('visible');
            }, 800);
            audio.play().catch(error => console.log("Cần tương tác để phát nhạc:", error));
        });

        document.body.addEventListener('touchstart', () => {
             if(audio.paused) audio.play().catch(()=>{});
        }, {once: true});

        // --- SỰ KIỆN MỞ THƯ & MƯA TIM BẤT NGỜ ---
        let isOpening = false;
        surpriseBtn.addEventListener('click', () => {
            if (isOpening) return; isOpening = true;
            letterModal.style.display = 'flex';
            setTimeout(() => {
                letterModal.style.opacity = '1';
                envelopeWrapper.classList.add('open');
                createHeavyHearts(60); 
                setTimeout(() => {
                    envelopeWrapper.classList.add('fully-opened');
                }, 1500);
            }, 50);
        });

        // Đóng thư
        closeModal.addEventListener('click', (e) => {
            e.stopPropagation();
            letterModal.style.opacity = '0';
            setTimeout(() => {
                letterModal.style.display = 'none';
                envelopeWrapper.classList.remove('open', 'fully-opened');
                isOpening = false;
            }, 500);
        });

        // Mưa tim bất ngờ khi mở thư
        function createHeavyHearts(num) {
            const colors = ['#ff4d6d', '#ff85a3', '#ffb3c6', '#d6336c'];
            for (let i = 0; i < num; i++) {
                const heart = document.createElement('div');
                heart.className = 'heavy-heart';
                heart.innerHTML = '<i class="fas fa-heart"></i>';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = Math.random() * 25 + 15 + 'px';
                heart.style.color = colors[Math.floor(Math.random() * colors.length)];
                heart.style.animationDuration = Math.random() * 3 + 3 + 's';
                heart.style.opacity = Math.random() * 0.7 + 0.3;
                rainContainer.appendChild(heart);
                setTimeout(() => heart.remove(), 6000);
            }
        }

       
        const images = [
            "https://vmstyle.vn/wp-content/uploads/2025/09/hinh-nen-tinh-yeu-cute-tong-pastel-phu-hop-man-hinh-dien-thoai-916-toi-uu-hien-thi-icon.jpg",
            "https://vmstyle.vn/wp-content/uploads/2025/09/hinh-nen-tinh-yeu-dong-vat-chu-cho-con-de-thuong-tao-cam-giac-am-ap-tren-man-hinh-lam-viec.jpg",
            "https://hoanghamobile.com/tin-tuc/wp-content/webp-express/webp-images/uploads/2023/09/hinh-nen-tinh-yeu-1.jpg.webp"
        ];
        let idx = 0;
        const slideshowImg = document.getElementById('slideshowImg');

        function changeImage() {
            slideshowImg.style.opacity = '0';
            
            setTimeout(() => {
                idx = (idx + 1) % images.length;
                slideshowImg.src = images[idx];
                slideshowImg.style.opacity = '1';
            }, 500); 
        }

        let autoSlide = setInterval(changeImage, 3500);

        document.getElementById('heartImage').addEventListener('click', () => {
            clearInterval(autoSlide);
            changeImage();
            autoSlide = setInterval(changeImage, 3500);
        });
    </script>

</body></html>
